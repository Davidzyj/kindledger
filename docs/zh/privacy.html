    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; color: #1f2933; background: #f7f2ea; }

  <body>
    <main>
      <h1>隐私政策</h1>
      <p>生效日期：2026 年 5 月 26 日</p>
      <p>善意簿是一款本地优先的私人记录应用，用来帮助你记录别人曾经给予你的帮助和善意。</p>

      <h2>数据收集</h2>
      <p>善意簿不会收集、出售、出租或分享你的个人数据。1.0.0 版本不包含账号系统、分析 SDK、广告 SDK 或第三方追踪。</p>

      <h2>本地存储</h2>
      <p>你的记录保存在设备本地。应用不会将你的记录上传到服务器。</p>

      <h2>网络使用</h2>
      <p>应用不会发起后台网络请求。只有当你主动点击隐私政策或支持链接时，系统浏览器才会打开对应网页。</p>

      <h2>联系我们</h2>
      <p>如有问题，请发送邮件至 <a href="mailto:jay212315@gmail.com">jay212315@gmail.com</a>。</p>
    </main>
